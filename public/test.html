<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div
      class="marquee"
      style="
        --play: running;
        --direction: normal;
        --duration: 28s;
        --delay: 0s;
        --iteration-count: infinite;
        --min-width: auto;
      "
    >
      <div class="initial-child-container">
        <div class="child" style="--transform: none">
          <h1 style="width: 700px; font-size: 30px; margin: 0px">
            Hover over this marquee to pause it!
          </h1>
        </div>
      </div>
      <div class="child" style="--transform: none">
        <h1 style="width: 700px; font-size: 30px; margin: 0px">
          Hover over this marquee to pause it!
        </h1>
      </div>
    </div>
  </body>
</html>
